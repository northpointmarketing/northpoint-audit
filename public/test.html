<!DOCTYPE html>
<html>
<head><title>Audit Test</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px">
  <h2>Northpoint Audit Tester</h2>
  <input id="url" type="text" placeholder="https://yourwebsite.com" style="width:100%;padding:8px;margin:8px 0;font-size:14px;color:#64748B">
  <input id="email" type="text" placeholder="your@email.com" style="width:100%;padding:8px;margin:8px 0;font-size:14px;color:#64748B">
  <button onclick="run()" style="padding:10px 24px;background:#0D1F3C;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">Run Audit</button>
  <pre id="out" style="margin-top:20px;background:#f1f5f9;padding:16px;border-radius:8px;white-space:pre-wrap;font-size:12px"></pre>
  <script>
    async function run() {
      document.getElementById('out').textContent = 'Running... (30-40 seconds)';
      try {
        const r = await fetch('/api/audit', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            url: document.getElementById('url').value,
            email: document.getElementById('email').value
          })
        });
        const d = await r.json();
        document.getElementById('out').textContent = JSON.stringify(d, null, 2);
      } catch(e) {
        document.getElementById('out').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
